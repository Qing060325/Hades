# Hades v0.2.0 完整配置示例
# 支持所有协议: SS/VMess/VLESS/Trojan/Hysteria2/TUIC/WireGuard
# 完全兼容 Clash YAML 格式

# ========== 基础配置 ==========
mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false

# ========== 外部控制 ==========
external-controller: 0.0.0.0:9090
secret: ""

# ========== TUN 模式 (可选) ==========
tun:
  enable: false
  stack: mixed
  dns-hijack:
    - any:53
  auto-route: true
  auto-detect-interface: true
  mtu: 9000

# ========== DNS 配置 ==========
dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  fake-ip-filter:
    - '*.lan'
    - localhost.ptlogin2.qq.com
    - '+.srv.nintendo.net'

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  fallback:
    - tls://8.8.4.4
    - tls://1.1.1.1

  fallback-filter:
    geoip: true
    geoip-code: CN

# ========== 嗅探配置 ==========
sniffer:
  enable: true
  override-destination: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

# ========== 代理节点 ==========
proxies:
  # ----- Shadowsocks -----
  - name: "ss-node"
    type: ss
    server: ss.example.com
    port: 443
    cipher: aes-256-gcm
    password: "your-password"
    udp: true

  # ----- VMess -----
  - name: "vmess-ws"
    type: vmess
    server: vmess.example.com
    port: 443
    uuid: "your-uuid"
    alter-id: 0
    cipher: auto
    tls: true
    sni: vmess.example.com
    network: ws
    ws-path: /vmess
    ws-headers:
      Host: vmess.example.com

  # ----- VLESS + Vision -----
  - name: "vless-vision"
    type: vless
    server: vless.example.com
    port: 443
    uuid: "your-uuid"
    tls: true
    sni: vless.example.com
    flow: xtls-rprx-vision
    udp: true

  # ----- VLESS + gRPC -----
  - name: "vless-grpc"
    type: vless
    server: vless-grpc.example.com
    port: 443
    uuid: "your-uuid"
    tls: true
    sni: vless-grpc.example.com
    network: grpc
    grpc-service-name: vless

  # ----- Trojan -----
  - name: "trojan-node"
    type: trojan
    server: trojan.example.com
    port: 443
    password: "your-password"
    sni: trojan.example.com
    udp: true

  # ----- Trojan + WebSocket -----
  - name: "trojan-ws"
    type: trojan
    server: trojan-ws.example.com
    port: 443
    password: "your-password"
    sni: trojan-ws.example.com
    network: ws
    ws-path: /trojan

  # ----- Hysteria2 (新增) -----
  - name: "hysteria2-node"
    type: hysteria2
    server: hy2.example.com
    port: 443
    password: "your-password"
    sni: hy2.example.com
    skip-cert-verify: false
    up: "100 Mbps"
    down: "100 Mbps"
    # obfs: salamander
    # obfs-password: "obfs-password"

  # ----- TUIC (新增) -----
  - name: "tuic-node"
    type: tuic
    server: tuic.example.com
    port: 443
    uuid: "your-uuid"
    password: "your-password"
    alpn:
      - h3
    congestion-controller: bbr
    sni: tuic.example.com
    skip-cert-verify: false
    udp-relay-mode: native
    heartbeat-interval: 10000

  # ----- WireGuard (新增) -----
  - name: "wireguard-node"
    type: wireguard
    server: wg.example.com
    port: 51820
    private-key: "your-private-key"
    public-key: "peer-public-key"
    pre-shared-key: ""
    mtu: 1400
    udp: true
    allowed-ips:
      - "0.0.0.0/0"
      - "::/0"
    reserved: [1, 2, 3]

# ========== 代理组 ==========
proxy-groups:
  # 手动选择
  - name: "proxy"
    type: select
    proxies:
      - auto-select
      - fallback-group
      - ss-node
      - vmess-ws
      - vless-vision
      - trojan-node
      - hysteria2-node
      - tuic-node
      - wireguard-node
      - DIRECT

  # 自动选择
  - name: "auto-select"
    type: url-test
    proxies:
      - ss-node
      - vmess-ws
      - vless-vision
      - trojan-node
      - hysteria2-node
      - tuic-node
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
    timeout: 5000

  # 故障转移
  - name: "fallback-group"
    type: fallback
    proxies:
      - vless-vision
      - trojan-node
      - hysteria2-node
      - ss-node
    url: "https://www.gstatic.com/generate_204"
    interval: 300

  # 流媒体
  - name: "streaming"
    type: select
    proxies:
      - proxy
      - auto-select
      - DIRECT

  # 国内直连
  - name: "domestic"
    type: select
    proxies:
      - DIRECT
      - proxy

# ========== 规则 ==========
rules:
  # 流媒体
  - DOMAIN-SUFFIX,netflix.com,streaming
  - DOMAIN-SUFFIX,nflxvideo.net,streaming
  - DOMAIN-SUFFIX,youtube.com,streaming
  - DOMAIN-SUFFIX,googlevideo.com,streaming
  - DOMAIN-SUFFIX,ytimg.com,streaming

  # 国内直连
  - DOMAIN-SUFFIX,cn,domestic
  - DOMAIN-KEYWORD,baidu,domestic
  - DOMAIN-KEYWORD,taobao,domestic
  - DOMAIN-KEYWORD,alipay,domestic
  - DOMAIN-KEYWORD,tmall,domestic

  # 代理
  - DOMAIN-SUFFIX,google.com,proxy
  - DOMAIN-SUFFIX,googleapis.com,proxy
  - DOMAIN-SUFFIX,github.com,proxy
  - DOMAIN-SUFFIX,githubusercontent.com,proxy
  - DOMAIN-KEYWORD,google,proxy

  # GeoIP
  - GEOIP,CN,domestic

  # 最终规则
  - MATCH,proxy
