# Hades 最小化配置
# 开箱即用，适合快速启动

# 混合端口 (HTTP + SOCKS5)
mixed-port: 7890

# 允许局域网
allow-lan: true

# 运行模式
mode: rule

# 日志级别
log-level: info

# API 控制端口
external-controller: 0.0.0.0:9090

# DNS 配置
dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - https://dns.alidns.com/dns-query

# 代理组
proxy-groups:
  - name: "proxy"
    type: select
    proxies:
      - DIRECT

# 规则
rules:
  - GEOIP,CN,DIRECT
  - MATCH,DIRECT
