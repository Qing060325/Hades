name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binaries
        run: |
          mkdir -p dist
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          LDFLAGS="-s -w -X github.com/Qing060325/Hades/internal/version.BuildTime=${BUILD_TIME}"

          # Linux AMD64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/hades-linux-amd64 ./cmd/hades
          # Linux ARM64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/hades-linux-arm64 ./cmd/hades
          # Darwin AMD64
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/hades-darwin-amd64 ./cmd/hades
          # Darwin ARM64
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/hades-darwin-arm64 ./cmd/hades
          # Windows AMD64
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/hades-windows-amd64.exe ./cmd/hades
          # Windows ARM64
          CGO_ENABLED=0 GOOS=windows GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/hades-windows-arm64.exe ./cmd/hades
          # OpenWrt MIPS
          CGO_ENABLED=0 GOOS=linux GOARCH=mips GOMIPS=softfloat go build -ldflags "${LDFLAGS}" -o dist/hades-linux-mips ./cmd/hades
          # OpenWrt MIPSLE
          CGO_ENABLED=0 GOOS=linux GOARCH=mipsle GOMIPS=softfloat go build -ldflags "${LDFLAGS}" -o dist/hades-linux-mipsle ./cmd/hades
          # OpenWrt ARMv7
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -ldflags "${LDFLAGS}" -o dist/hades-linux-armv7 ./cmd/hades

          # 生成 SHA256 校验文件
          cd dist && sha256sum * > checksums-sha256.txt && cd ..

      - name: Generate Release Notes
        id: release_notes
        run: |
          # 获取上一个 tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # 生成分类的变更日志
          FEATURES=""
          FIXES=""
          OTHER=""

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"%s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"%s" --no-merges -50)
          fi

          while IFS= read -r commit; do
            if echo "$commit" | grep -qiE '^(feat|feature)(\(|:|:)'; then
              FEATURES="${FEATURES}- ${commit}\n"
            elif echo "$commit" | grep -qiE '^(fix|bugfix)(\(|:|:)'; then
              FIXES="${FIXES}- ${commit}\n"
            else
              OTHER="${OTHER}- ${commit}\n"
            fi
          done <<< "$COMMITS"

          # 构建 Release Body
          BODY=""
          if [ -n "$FEATURES" ]; then
            BODY="${BODY}## ✨ 新功能\n${FEATURES}\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}## 🐛 修复\n${FIXES}\n"
          fi
          if [ -n "$OTHER" ]; then
            BODY="${BODY}## 📝 其他变更\n${OTHER}\n"
          fi

          BODY="${BODY}## 📦 下载\n\n| 平台 | 架构 | 文件 |\n|------|------|------|\n| Linux | AMD64 | hades-linux-amd64 |\n| Linux | ARM64 | hades-linux-arm64 |\n| OpenWrt | MIPS | hades-linux-mips |\n| OpenWrt | MIPSLE | hades-linux-mipsle |\n| OpenWrt | ARMv7 | hades-linux-armv7 |\n| macOS | AMD64 | hades-darwin-amd64 |\n| macOS | ARM64 | hades-darwin-arm64 |\n| Windows | AMD64 | hades-windows-amd64.exe |\n| Windows | ARM64 | hades-windows-arm64.exe |\n\n**OpenWrt 一键安装:**\n\`\`\`bash\ncurl -fsSL https://raw.githubusercontent.com/Qing060325/Hades/main/openwrt/install.sh | sh\n\`\`\`\n"

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: ${{ steps.release_notes.outputs.body }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
