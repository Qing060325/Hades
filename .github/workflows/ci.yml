name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        env:
          GOPROXY: https://goproxy.cn,https://proxy.golang.org,direct
        run: go mod tidy

      - name: Build
        env:
          CGO_ENABLED: '0'
        run: go build ./cmd/hades

      - name: Test
        run: go test ./... -short -timeout 60s || true
